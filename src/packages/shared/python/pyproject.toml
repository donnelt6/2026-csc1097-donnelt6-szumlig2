[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "caddie-shared-python"
version = "0.1.0"
description = "Shared Python contracts and utilities for Caddie"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.8.2,<3.0",
]

[tool.setuptools.packages.find]
where = ["."]
