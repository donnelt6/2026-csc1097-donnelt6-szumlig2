stages:
  - lint
  - test
  - build
  - deploy
  - post_deploy

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

variables:
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.cache/npm"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  NEXT_TELEMETRY_DISABLED: "1"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .cache/npm
    - .cache/pip

web_lint:
  image: node:20
  stage: lint
  script:
    - cd src
    - npm ci
    - npm run lint:web

web_typecheck:
  image: node:20
  stage: lint
  script:
    - cd src
    - npm ci
    - npm run typecheck:web

web_test:
  image: node:20
  stage: test
  script:
    - cd src
    - npm ci
    - npm --workspace apps/web run test -- --run

web_e2e:
  image: mcr.microsoft.com/playwright:v1.52.0-jammy
  stage: test
  script:
    - cd src
    - npm ci
    - npm --workspace apps/web run test:e2e

web_e2e_true:
  image: mcr.microsoft.com/playwright:v1.52.0-noble
  stage: test
  allow_failure: true
  services:
    - name: redis:7-alpine
      alias: redis
  variables:
    REDIS_URL: redis://redis:6379/0
    NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
    NEXT_PUBLIC_AUTH_REDIRECT_BASE_URL: http://127.0.0.1:3000
  before_script:
    - apt-get update
    - apt-get install -y python3 python3-venv python3-pip
  script:
    - cd src
    - mkdir -p .e2e-logs
    - npm ci
    - python3 -m venv .venv
    - . .venv/bin/activate
    - python -m pip install --upgrade pip
    - cd apps/api
    - python -m pip install -r requirements.txt
    - nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > ../../.e2e-logs/api.log 2>&1 &
    - cd ../worker
    - python -m pip install -r requirements.txt
    - nohup python -m celery -A worker.tasks worker --loglevel=info -P solo > ../../.e2e-logs/worker.log 2>&1 &
    - cd ../../
    - |
      for attempt in $(seq 1 40); do
        if python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"; then
          break
        fi
        if [ "$attempt" -eq 40 ]; then
          echo "API failed to become healthy."
          exit 1
        fi
        sleep 3
      done
    - npm run test:web:e2e:true
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - src/.e2e-logs/
      - src/apps/web/playwright-report/
      - src/apps/web/test-results/

web_build:
  image: node:20
  stage: build
  script:
    - cd src
    - npm ci
    - npm run build:web

api_build:
  image: python:3.11
  stage: build
  script:
    - cd src/apps/api
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt
    - python -m compileall -q app

worker_build:
  image: python:3.11
  stage: build
  script:
    - cd src/apps/worker
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt
    - python -m compileall -q worker

api_tests:
  image: python:3.11
  stage: test
  script:
    - cd src/apps/api
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt
    - pytest -q

api_integration_tests:
  image: python:3.11
  stage: test
  script:
    - cd src/apps/api
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt
    - pytest -q tests/integration

worker_tests:
  image: python:3.11
  stage: test
  script:
    - cd src/apps/worker
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt
    - python -m spacy download en_core_web_sm
    - pytest -q

promote_production:
  image: alpine:3.20
  stage: deploy
  resource_group: production
  needs:
    - web_lint
    - web_typecheck
    - web_test
    - web_e2e
    - web_build
    - api_build
    - api_tests
    - api_integration_tests
    - worker_build
    - worker_tests
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
    - when: never
  before_script:
    - apk add --no-cache git
    - test -n "$GITHUB_MIRROR_REPO" || (echo "GITHUB_MIRROR_REPO is required" && exit 1)
    - test -n "$GITHUB_MIRROR_USERNAME" || (echo "GITHUB_MIRROR_USERNAME is required" && exit 1)
    - test -n "$GITHUB_MIRROR_TOKEN" || (echo "GITHUB_MIRROR_TOKEN is required" && exit 1)
  script:
    - git remote remove github-mirror || true
    - git remote add github-mirror "https://${GITHUB_MIRROR_USERNAME}:${GITHUB_MIRROR_TOKEN}@${GITHUB_MIRROR_REPO}"
    - git push github-mirror HEAD:main
  environment:
    name: production

post_deploy_health:
  image: alpine:3.20
  stage: post_deploy
  resource_group: production
  needs:
    - promote_production
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - when: never
  before_script:
    - apk add --no-cache curl
    - test -n "$PRODUCTION_API_HEALTH_URL" || (echo "PRODUCTION_API_HEALTH_URL is required" && exit 1)
  script:
    - |
      echo "Waiting 2 minutes 30 seconds before starting the production API health check."
      sleep 150
      attempts=0
      max_attempts=20
      stability_checks=12
      until [ "$attempts" -ge "$max_attempts" ]; do
        attempts=$((attempts + 1))
        response="$(curl --silent --show-error --location --write-out '\n%{http_code}' "$PRODUCTION_API_HEALTH_URL" || true)"
        status="$(printf '%s\n' "$response" | tail -n 1)"
        body="$(printf '%s\n' "$response" | sed '$d')"
        if [ "$status" = "200" ] && printf '%s' "$body" | grep -F '"status":"ok"' >/dev/null; then
          echo "Initial production API health check passed. Verifying stability for 3 minutes."
          stable_attempt=0
          while [ "$stable_attempt" -lt "$stability_checks" ]; do
            stable_attempt=$((stable_attempt + 1))
            sleep 15
            stable_response="$(curl --silent --show-error --location --write-out '\n%{http_code}' "$PRODUCTION_API_HEALTH_URL" || true)"
            stable_status="$(printf '%s\n' "$stable_response" | tail -n 1)"
            stable_body="$(printf '%s\n' "$stable_response" | sed '$d')"
            if [ "$stable_status" != "200" ] || ! printf '%s' "$stable_body" | grep -F '"status":"ok"' >/dev/null; then
              echo "Production API became unhealthy during stability verification."
              echo "Stability check $stable_attempt/$stability_checks failed with status ${stable_status:-unavailable}."
              exit 1
            fi
          done
          echo "Production API health check passed and remained healthy for 3 minutes."
          exit 0
        fi
        echo "Health check attempt $attempts/$max_attempts failed with status ${status:-unavailable}."
        sleep 15
      done
      echo "Production API health check failed."
      exit 1
  environment:
    name: production
